apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitlab-runner
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://gitlab.com/<org>/<repo>.git
    targetRevision: main
    path: helm/gitlab-runner

  destination:
    server: https://kubernetes.default.svc
    namespace: gitlab-runner

  syncPolicy:
    automated:
      prune: true
      selfHeal: true